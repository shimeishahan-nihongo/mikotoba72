<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>みことば72 暗唱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --bg2: #f0ebe3;
  --surface: #ffffff;
  --border: #e0d8ce;
  --border2: #c4bab0;
  --ink: #1c1812;
  --ink2: #54493e;
  --ink3: #96897c;
  --accent: #8b3a22;
  --accent2: #c26b38;
  --accent-light: #fdf0e8;
  --green: #2a6048;
  --green-light: #eaf5ef;
  --red: #a83425;
  --red-light: #fdecea;
  --blue: #2c5a8a;
  --blue-light: #eaf1f9;
  --shadow: 0 2px 10px rgba(26,22,18,0.07);
  --shadow-lg: 0 8px 28px rgba(26,22,18,0.13);
  --r: 14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{background:var(--bg);color:var(--ink);font-family:'Noto Serif JP',serif;min-height:100vh;line-height:1.7;}

/* HEADER */
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:1.4rem 1rem 0;
  text-align:center;
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow);
}
.header-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.88rem;color:var(--accent2);letter-spacing:.18em;margin-bottom:.2rem;}
header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,5vw,2.6rem);font-weight:600;color:var(--ink);letter-spacing:.03em;line-height:1.15;}
.header-sub{font-family:'Noto Sans KR',sans-serif;font-size:.78rem;color:var(--ink3);margin-top:.15rem;}

/* GLOBAL PROGRESS */
.gp-wrap{max-width:500px;margin:.8rem auto 0;padding:0 .5rem;}
.gp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;}
.gp-label{font-size:.74rem;color:var(--ink3);}
.gp-num{font-size:.78rem;color:var(--accent);font-weight:600;}
.gp-bar{background:var(--bg2);border-radius:99px;height:5px;overflow:hidden;}
.gp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease;}
.gp-reset{font-size:.68rem;color:var(--ink3);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit;display:block;text-align:right;margin-top:.25rem;padding:0;}

/* TABS */
.tabs{display:flex;max-width:360px;margin:.8rem auto 0;background:var(--bg2);border-radius:99px;padding:3px;gap:3px;}
.tab-btn{flex:1;padding:.5rem .8rem;border-radius:99px;border:none;background:transparent;color:var(--ink3);font-family:'Noto Serif JP',serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--surface);color:var(--accent);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.09);}
.header-bottom{padding-bottom:.7rem;}

/* PART NAV — cards with progress dots */
.part-nav{
  display:flex;
  overflow-x:auto;
  gap:.5rem;
  padding:.9rem 1rem .5rem;
  max-width:600px;
  margin:0 auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.part-nav::-webkit-scrollbar{display:none;}
.pnav-btn{
  flex-shrink:0;
  background:var(--surface);
  border:1.5px solid var(--border);
  color:var(--ink2);
  padding:.4rem .9rem;
  border-radius:99px;
  cursor:pointer;
  font-family:'Noto Serif JP',serif;
  font-size:.82rem;
  transition:all .18s;
  white-space:nowrap;
  position:relative;
}
.pnav-btn:hover{border-color:var(--accent2);color:var(--accent);}
.pnav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.pnav-dot{
  position:absolute;top:-4px;right:-4px;
  width:16px;height:16px;
  background:var(--green);
  border-radius:50%;
  font-size:.58rem;
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
  border:2px solid var(--bg);
}

/* CARD NAVIGATOR (single card view) */
.card-nav-wrap{
  max-width:560px;
  margin:0 auto;
  padding:.5rem 1rem 5rem;
}
.card-counter{
  text-align:center;
  font-size:.78rem;
  color:var(--ink3);
  margin-bottom:.6rem;
  letter-spacing:.05em;
}
.card-counter strong{color:var(--accent);font-weight:600;}

/* BROWSE CARD */
.verse-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
  margin-bottom:1rem;
}
.verse-head{
  display:flex;align-items:flex-start;gap:.65rem;
  padding:.75rem 1.1rem;
  background:var(--accent-light);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.verse-num{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.73rem;font-weight:700;flex-shrink:0;}
.v-ref{font-size:.9rem;font-weight:600;color:var(--accent);}
.v-ref-kr{font-family:'Noto Sans KR',sans-serif;font-size:.73rem;color:var(--ink3);}
.cat-chip{margin-left:auto;font-size:.65rem;color:var(--ink3);background:var(--bg2);padding:.3rem .6rem;border-radius:6px;line-height:1.6;text-align:center;max-width:55%;}
.verse-body{padding:1.1rem 1.2rem;overflow:hidden;width:100%;box-sizing:border-box;}
.kr-text{font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;line-height:1.9;color:var(--ink2);margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid var(--border);word-break:keep-all;overflow-wrap:break-word;white-space:normal;width:100%;}
.jp-text{font-size:1.05rem;line-height:2.8;color:var(--ink);word-break:break-all;overflow-wrap:break-word;white-space:normal;width:100%;}
ruby{ruby-align:center;}
rt{font-size:.54em;color:var(--ink3);}

/* QUIZ CARD */
.quiz-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  box-shadow:var(--shadow);
  margin-bottom:1rem;
}
.qc-head{
  display:flex;align-items:center;gap:.55rem;
  padding:.7rem 1.1rem;
  background:var(--accent-light);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.qc-ref{font-size:.9rem;font-weight:700;color:var(--accent);}
.qc-part{font-size:.68rem;color:var(--ink3);line-height:1.6;flex:1;min-width:0;text-align:center;}
.qc-pass{font-size:.72rem;color:var(--green);font-weight:600;margin-left:auto;}
.quiz-body{padding:1.1rem 1.2rem;}

/* QUIZ TEXT — スマホ対応で折り返し */
.quiz-text{
  font-size:1.05rem;
  line-height:3;
  color:var(--ink);
  margin-bottom:.9rem;
  word-break:break-all;
  overflow-wrap:break-word;
  white-space:normal;
}
.quiz-text.kr{font-family:'Noto Sans KR',sans-serif;line-height:2.6;word-break:keep-all;}

/* BLANK INPUT — スマホ対応 */
.blank-wrap{
  display:inline-block;
  vertical-align:baseline;
}
.blank-inp{
  display:inline-block;
  background:var(--blue-light);
  border:1.5px solid #aac4de;
  border-radius:5px;
  padding:2px 4px;
  color:var(--blue);
  font-family:inherit;
  font-size:1em;
  outline:none;
  text-align:center;
  box-sizing:content-box;
  /* 幅はJS側でemで設定。入力しても縮まない */
  min-width:2em;
}
.blank-inp:focus{ border-color:var(--blue); background:#d8eaf7; }
.blank-wrap.ok .blank-inp{ border-color:var(--green); background:var(--green-light); color:var(--green); }
.blank-wrap.ng .blank-inp{ border-color:var(--red); background:var(--red-light); color:var(--red); }
.blank-wrap.show .blank-inp{ border-color:var(--accent2); background:var(--accent-light); color:var(--accent); }

/* ACTIONS */
.qactions{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:.3rem;}
.btn-ok{padding:.5rem 1.1rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-family:inherit;border:none;background:var(--accent);color:#fff;transition:all .15s;font-weight:600;}
.btn-ok:hover{background:var(--accent2);}
.btn-sub{padding:.5rem .9rem;border-radius:7px;cursor:pointer;font-size:.85rem;font-family:inherit;border:1.5px solid var(--border);background:var(--surface);color:var(--ink2);transition:all .15s;}
.btn-sub:hover{border-color:var(--border2);background:var(--bg2);}
.score-badge{font-size:.82rem;padding:.22rem .7rem;border-radius:99px;margin-left:auto;}
.score-badge.ok{background:var(--green-light);color:var(--green);border:1px solid #9fd3be;font-weight:600;}
.score-badge.ng{background:var(--red-light);color:var(--red);border:1px solid #e8a99a;}

/* PREV / NEXT NAV */
.page-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:.5rem;
  margin-top:.6rem;
}
.nav-btn{
  display:flex;align-items:center;gap:.3rem;
  padding:.55rem 1rem;
  border-radius:8px;
  border:1.5px solid var(--border);
  background:var(--surface);
  color:var(--ink2);
  font-family:'Noto Serif JP',serif;
  font-size:.85rem;
  cursor:pointer;
  transition:all .18s;
  flex:1;
  justify-content:center;
}
.nav-btn:hover:not(:disabled){border-color:var(--accent2);color:var(--accent);background:var(--accent-light);}
.nav-btn:disabled{opacity:.35;cursor:default;}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.nav-btn.primary:hover:not(:disabled){background:var(--accent2);border-color:var(--accent2);}

/* QUIZ CONTROLS */
.quiz-controls{
  display:flex;flex-wrap:wrap;gap:.4rem .8rem;
  padding:.4rem .5rem .8rem;
  align-items:center;
  max-width:560px;margin:0 auto;
}
.ctrl-lbl{font-size:.78rem;color:var(--ink3);white-space:nowrap;}
.tg{display:flex;}
.tg-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--ink2);padding:.36rem .75rem;cursor:pointer;font-size:.78rem;font-family:'Noto Serif JP',serif;transition:all .15s;}
.tg-btn:first-child{border-radius:6px 0 0 6px;}
.tg-btn:last-child{border-radius:0 6px 6px 0;}
.tg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}

/* PROGRESS BAR (quiz) */
.qp-wrap{max-width:560px;margin:0 auto .8rem;}
.qp-text{font-size:.74rem;color:var(--ink3);text-align:right;margin-bottom:.25rem;}
.qp-bar{background:var(--bg2);border-radius:99px;height:4px;overflow:hidden;}
.qp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s;}

.hidden{display:none!important;}

/* FADE ANIMATION */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.verse-card,.quiz-card{animation:fadeIn .25s ease both;}

@media(max-width:480px){
  header{padding:1rem .8rem 0;}
  .card-nav-wrap{padding:.4rem .7rem 5rem;}
  .verse-body,.quiz-body{padding:.9rem;}
  .jp-text,.kr-text,.quiz-text{font-size:.97rem;}
  .blank-inp{font-size:.93em;padding:2px 3px;}
  .nav-btn{font-size:.8rem;padding:.5rem .7rem;}
}
</style>
</head>
<body>
<header>
  <div class="header-eyebrow">Scripture Memorization</div>
  <h1>みことば心碑 72</h1>
  <div class="header-sub">성경암송 72구절</div>
  <div class="gp-wrap">
    <div class="gp-top">
      <span class="gp-label">📖 全体の暗唱進捗</span>
      <span class="gp-num" id="gp-text">0 / 72 節</span>
    </div>
    <div class="gp-bar"><div class="gp-fill" id="gp-fill" style="width:0%"></div></div>
    <button class="gp-reset" onclick="confirmClearProgress()">進捗をリセット</button>
  </div>
  <div class="header-bottom">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('browse')">📖 閲覧</button>
      <button class="tab-btn" onclick="switchTab('quiz')">✏️ 暗唱テスト</button>
    </div>
  </div>
</header>

<!-- BROWSE MODE -->
<div id="browse-mode">
  <div class="part-nav" id="browse-parts"></div>
  <div class="card-nav-wrap">
    <div class="card-counter" id="b-counter"></div>
    <div id="browse-content"></div>
    <div class="page-nav" id="b-page-nav"></div>
  </div>
</div>

<!-- QUIZ MODE -->
<div id="quiz-mode" class="hidden">
  <div class="part-nav" id="quiz-parts"></div>
  <div class="quiz-controls">
    <span class="ctrl-lbl">言語：</span>
    <div class="tg">
      <button class="tg-btn active" onclick="setLang('jp')" id="lang-jp">日本語</button>
      <button class="tg-btn" onclick="setLang('kr')" id="lang-kr">한국어</button>
    </div>
    <span class="ctrl-lbl">難易度：</span>
    <div class="tg">
      <button class="tg-btn active" onclick="setDiff('easy')" id="diff-easy">やさしい</button>
      <button class="tg-btn" onclick="setDiff('medium')" id="diff-medium">ふつう</button>
      <button class="tg-btn" onclick="setDiff('hard')" id="diff-hard">むずかしい</button>
    </div>
  </div>
  <div class="qp-wrap">
    <div class="qp-text" id="qp-text"></div>
    <div class="qp-bar"><div class="qp-fill" id="qp-fill"></div></div>
  </div>
  <div class="card-nav-wrap">
    <div class="card-counter" id="q-counter"></div>
    <div id="quiz-content"></div>
    <div class="page-nav" id="q-page-nav"></div>
  </div>
</div>

<script>
const PARTS = [
  { id: 'A', jp: '新しい人生', kr: '새로운 삶' },
  { id: 'B', jp: 'キリストを伝える', kr: '그리스도를 전파함' },
  { id: 'C', jp: '神への信頼', kr: '하나님을 의뢰함' },
  { id: 'D', jp: 'キリストの弟子の資格', kr: '그리스도 제자의 자격' },
  { id: 'E', jp: 'キリストに似る', kr: '그리스도를 닮아감' },
  { id: 'F', jp: '全き人格', kr: '온전한 인격' },
];

const VERSES = [
  // === A ===
  {part:'A', cat_jp:'中心なるキリスト', cat_kr:'중심되신 그리스도', num:1,
   ref:'Ⅱコリント 5:17', ref_kr:'고후5:17',
   kr:'그런즉 누구든지 그리스도 안에 있으면 새로운 피조물이라 이전 것은 지나갔으니 보라 새 것이 되었도다',
   jp_raw:'だれでも キリストの うちに あるなら、 その人は 新しく 造られた 者です。 古いものは 過ぎ去って、 見よ、 すべてが 新しくなりました。',
   jp_ruby:'だれでもキリストのうちにあるなら、その<ruby>人<rt>ひと</rt></ruby>は<ruby>新<rt>あたら</rt></ruby>しく<ruby>造<rt>つく</rt></ruby>られた<ruby>者<rt>もの</rt></ruby>です。<ruby>古<rt>ふる</rt></ruby>いものは<ruby>過<rt>す</rt></ruby>ぎ<ruby>去<rt>さ</rt></ruby>って、<ruby>見<rt>み</rt></ruby>よ、すべてが<ruby>新<rt>あたら</rt></ruby>しくなりました。'},
  {part:'A', cat_jp:'中心なるキリスト', cat_kr:'중심되신 그리스도', num:2,
   ref:'ガラテヤ 2:20', ref_kr:'갈2:20',
   kr:'내가 그리스도와 함께 십자가에 못 박혔나니 그런즉 이제는 내가 산 것이 아니요 오직 내 안에 그리스도께서 사신 것이라 이제 내가 육체 가운데 사는 것은 나를 사랑하사 나를 위하여 자기 몸을 버리신 하나님의 아들을 믿는 믿음 안에서 사는 것이라',
   jp_raw:'私は キリストと ともに 十字架に つけられました。 もはや 私が 生きているのでは なく、 キリストが 私のうちに 生きておられるのです。 いま 私が、 この世に 生きているのは、 私を 愛し 私のために ご自身を お捨てになった 神の 御子を 信じる 信仰に よっているのです。',
   jp_ruby:'<ruby>私<rt>わたし</rt></ruby>はキリストとともに<ruby>十字架<rt>じゅうじか</rt></ruby>につけられました。もはや<ruby>私<rt>わたし</rt></ruby>が<ruby>生<rt>い</rt></ruby>きているのではなく、キリストが<ruby>私<rt>わたし</rt></ruby>のうちに<ruby>生<rt>い</rt></ruby>きておられるのです。いま<ruby>私<rt>わたし</rt></ruby>が、この<ruby>世<rt>よ</rt></ruby>に<ruby>生<rt>い</rt></ruby>きているのは、<ruby>私<rt>わたし</rt></ruby>を<ruby>愛<rt>あい</rt></ruby>し<ruby>私<rt>わたし</rt></ruby>のためにご<ruby>自身<rt>じしん</rt></ruby>をお<ruby>捨<rt>す</rt></ruby>てになった<ruby>神<rt>かみ</rt></ruby>の<ruby>御子<rt>みこ</rt></ruby>を<ruby>信<rt>しん</rt></ruby>じる<ruby>信仰<rt>しんこう</rt></ruby>によっているのです。'},
  {part:'A', cat_jp:'キリストへの従順', cat_kr:'그리스도께 순종', num:3,
   ref:'ローマ 12:1', ref_kr:'롬12:1',
   kr:'그러므로 형제들아 내가 하나님의 모든 자비하심으로 너희를 권하노니 너희 몸을 하나님이 기뻐하시는 거룩한 산 제사로 드리라 이는 너희의 드릴 영적 예배니라',
   jp_raw:'そういうわけですから、 兄弟たち。 私は、 神の あわれみの ゆえに、 あなたがたに お願いします。 あなたがたの からだを、 神に 受け入れられる、 聖い 生きた 供え物として ささげなさい。 それこそ、 あなたがたの 霊的な 礼拝です。',
   jp_ruby:'そういうわけですから、<ruby>兄弟<rt>きょうだい</rt></ruby>たち。<ruby>私<rt>わたし</rt></ruby>は、<ruby>神<rt>かみ</rt></ruby>のあわれみのゆえに、あなたがたにお<ruby>願<rt>ねが</rt></ruby>いします。あなたがたのからだを、<ruby>神<rt>かみ</rt></ruby>に<ruby>受<rt>う</rt></ruby>け<ruby>入<rt>い</rt></ruby>れられる、<ruby>聖<rt>きよ</rt></ruby>い<ruby>生<rt>い</rt></ruby>きた<ruby>供<rt>そな</rt></ruby>え<ruby>物<rt>もの</rt></ruby>としてささげなさい。それこそ、あなたがたの<ruby>霊的<rt>れいてき</rt></ruby>な<ruby>礼拝<rt>れいはい</rt></ruby>です。'},
  {part:'A', cat_jp:'キリストへの従順', cat_kr:'그리스도께 순종', num:4,
   ref:'ヨハネ 14:21', ref_kr:'요14:21',
   kr:'나의 계명을 가지고 지키는 자라야 나를 사랑하는 자니 나를 사랑하는 자는 내 아버지게 사랑을 받을 것이요 나도 그를 사랑하여 그에게 나를 나타내리라',
   jp_raw:'わたしの 戒めを 保ち、 それを 守る 人は、 わたしを 愛する 人です。 わたしを 愛する 人は わたしの 父に 愛され、 わたしも その人を 愛し、 わたし自身を 彼に 現わします。',
   jp_ruby:'わたしの<ruby>戒<rt>いまし</rt></ruby>めを<ruby>保<rt>たも</rt></ruby>ち、それを<ruby>守<rt>まも</rt></ruby>る<ruby>人<rt>ひと</rt></ruby>は、わたしを<ruby>愛<rt>あい</rt></ruby>する<ruby>人<rt>ひと</rt></ruby>です。わたしを<ruby>愛<rt>あい</rt></ruby>する<ruby>人<rt>ひと</rt></ruby>はわたしの<ruby>父<rt>ちち</rt></ruby>に<ruby>愛<rt>あい</rt></ruby>され、わたしもその<ruby>人<rt>ひと</rt></ruby>を<ruby>愛<rt>あい</rt></ruby>し、わたし<ruby>自身<rt>じしん</rt></ruby>を<ruby>彼<rt>かれ</rt></ruby>に<ruby>現<rt>あら</rt></ruby>わします。'},

   kr:'우리가 그를 전파하여 각 사람을 권하고 모든 지혜로 각 사람을 가르침은 각 사람을 그리스도 안에서 완전한 자로 세우려 함이니 이를 위하여 나도 내 속에서 능력으로 역사하시는 이의 역사를 따라 힘을 다하여 수고하노라',

// ===== PROGRESS =====
const SK='mikotoba72_v4';
const loadProg=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{}}catch(e){return{}}};
const saveProg=(k,p)=>{try{const d=loadProg();d[k]={passed:p,date:new Date().toISOString()};localStorage.setItem(SK,JSON.stringify(d));}catch(e){}};
const clearProg=()=>{try{localStorage.removeItem(SK);}catch(e){}};
const vkey=(v)=>v.part+'-'+v.num+'-'+v.ref;

// ===== STATE =====
let tab='browse';
let bPart='A', bIdx=0;   // browse: current part + card index
let qPart='A', qIdx=0;   // quiz: current part + card index
let lang='jp', diff='easy';
let QS={};  // quiz state per verse index

// ===== HELPERS =====
function partVerses(part){ return part==='ALL'?VERSES:VERSES.filter(v=>v.part===part); }

// ===== INIT =====
function init(){
  buildPartNav('browse-parts','browse');
  buildPartNav('quiz-parts','quiz');
  renderBrowseCard();
  renderQuizCard();
  updateGP();
}

// ===== PART NAV =====
function buildPartNav(cid, mode){
  const el=document.getElementById(cid); el.innerHTML='';
  const parts=mode==='browse'?['A','B','C','D','E','F']:['A','B','C','D','E','F'];
  parts.forEach(pid=>{
    const pi=PARTS.find(p=>p.id===pid);
    const cur=mode==='browse'?bPart:qPart;
    const btn=document.createElement('button');
    btn.className='pnav-btn'+(cur===pid?' active':'');
    btn.dataset.part=pid;
    btn.innerHTML=`${pid}. ${pi.jp}`;
    // Add pass count dot
    const pv=partVerses(pid);
    const saved=loadProg();
    const passed=pv.filter(v=>saved[vkey(v)]&&saved[vkey(v)].passed).length;
    if(passed>0){
      const dot=document.createElement('span');
      dot.className='pnav-dot';
      dot.textContent=passed;
      btn.appendChild(dot);
    }
    btn.onclick=()=>{
      if(mode==='browse'){bPart=pid;bIdx=0;renderBrowseCard();}
      else{qPart=pid;qIdx=0;QS={};renderQuizCard();}
      upPartNav(mode);
    };
    el.appendChild(btn);
  });
}

function upPartNav(mode){
  const cid=mode==='browse'?'browse-parts':'quiz-parts';
  const cur=mode==='browse'?bPart:qPart;
  document.getElementById(cid).querySelectorAll('.pnav-btn').forEach(btn=>{
    btn.className='pnav-btn'+(btn.dataset.part===cur?' active':'');
  });
  // Rebuild to refresh dots
  buildPartNav(cid, mode);
}

// ===== BROWSE =====
function renderBrowseCard(){
  const verses=partVerses(bPart);
  const total=verses.length;
  if(bIdx<0)bIdx=0;
  if(bIdx>=total)bIdx=total-1;
  const v=verses[bIdx];
  if(!v){document.getElementById('browse-content').innerHTML='';return;}

  document.getElementById('b-counter').innerHTML=
    `<strong>${bPart}パート</strong> &nbsp;${bIdx+1} / ${total}節`;

  document.getElementById('browse-content').innerHTML=`
    <div class="verse-card">
      <div class="verse-head">
        <div class="verse-num">${v.num}</div>
        <div>
          <div class="v-ref">${v.ref}</div>
          <div class="v-ref-kr">${v.ref_kr}</div>
        </div>
        <div class="cat-chip">${v.cat_jp}<br><span style="font-family:'Noto Sans KR',sans-serif;color:var(--ink3)">${v.cat_kr}</span></div>
      </div>
      <div class="verse-body">
        <div class="kr-text">${v.kr}</div>
        <div class="jp-text">${v.jp_ruby}</div>
      </div>
    </div>`;

  // Page nav
  document.getElementById('b-page-nav').innerHTML=`
    <button class="nav-btn" onclick="browseGo(-1)" ${bIdx===0?'disabled':''}>← 前</button>
    <button class="nav-btn" onclick="browseGo(1)" ${bIdx===total-1?'disabled':''}>次 →</button>`;

  window.scrollTo({top:0,behavior:'smooth'});
}

function browseGo(dir){
  bIdx+=dir;
  renderBrowseCard();
}

// ===== QUIZ =====
function tokenize(text,l){
  // 日本語・韓国語ともにスペース区切りで分割
  // 例: "だれでも キリストの うちに あるなら" → ["だれでも","キリストの","うちに","あるなら"]
  return text.split(/\s+/).filter(t=>t.trim().length>0);
}
function selectBlanks(words,d,l){
  // 接続詞・助詞系の語を除外し、重要語（名詞・動詞・形容詞相当）を優先
  const JP_SKIP=/^(だから|しかし|また|そして|ところで|それゆえ|ですから|そういうわけですから|なぜなら|もし|いや|むしろ|それで|そこで|このように|このために|そうすれば|そのために|それは|これが|これを|なお|さらに|ただし|つまり|すなわち|ただ|いつも|すべて|みな|まことに|見よ|また、|いや、|ところで、|ですから、|だから、|しかし、|そして、|なぜなら、)$/;
  const KR_SKIP=/^(그러므로|그런즉|그러나|또한|오직|다만|이는|이것은|곧|즉|만약|비록|따라서|그래서|하지만|그리고|또|왜냐하면|그런데|사실|실로|진실로|보라|참으로)$/;

  // スコアリング：重要語ほど高スコア
  function score(w, lang){
    if(lang==='jp'){
      // 接続詞系は除外
      if(JP_SKIP.test(w.replace(/、|。/g,''))) return 0;
      // 固有名詞・神学用語（カタカナ含む）は最高優先
      if(/[ァ-ヶ]/.test(w)) return 5;
      // 漢字を含む語は高優先
      if(/[一-鿿]/.test(w)) return 4;
      // ひらがなの動詞・形容詞っぽい語（2文字以上）
      if(/[ぁ-ゖ]/.test(w) && w.length>=3) return 3;
      if(w.length>=2) return 2;
      return 1;
    } else {
      // 韓国語: 接続詞系は除外
      if(KR_SKIP.test(w)) return 0;
      // 長い語ほど重要
      if(w.length>=5) return 5;
      if(w.length>=3) return 4;
      return 2;
    }
  }

  const scored = words
    .map((w,i)=>({w,i,s:score(w,l)}))
    .filter(x=>x.s>0 && !/^[、。「」！？…・\s,.]+$/.test(x.w));

  if(!scored.length) return new Set();

  // スコア降順にソート、同スコアはランダム
  const sorted=[...scored].sort((a,b)=> b.s!==a.s ? b.s-a.s : Math.random()-.5);

  // easy: 上位2つ, medium: 上位4つ, hard: 上位65%
  if(d==='easy') return new Set(sorted.slice(0,Math.min(2,sorted.length)).map(x=>x.i));
  if(d==='medium') return new Set(sorted.slice(0,Math.min(4,sorted.length)).map(x=>x.i));
  const n=Math.max(4,Math.round(sorted.length*0.65));
  return new Set(sorted.slice(0,n).map(x=>x.i));
}
function mkBlanked(words,blanks,vIdx,l){
  return words.map((w,wi)=>{
    if(blanks.has(wi)){
      const ans=w.replace(/"/g,'&quot;');
      // 答えの文字数に応じたem幅（全角=1.1em、半角=0.65em）
      let emW=0;
      for(const c of w){
        if(/[\u3040-\u30ff\u4e00-\u9fff\u3400-\u4dbf\uff01-\uff60\u3000-\u303f]/.test(c)) emW+=1.15;
        else emW+=0.65;
      }
      const wrapW=Math.max(2.2, emW).toFixed(2)+'em';
      // ラッパーの幅でアンダーラインを固定し、inputはそこに収める
      return `<span class="blank-wrap" id="bw-${vIdx}-${wi}"><input class="blank-inp" id="b-${vIdx}-${wi}" data-answer="${ans}" style="width:${wrapW}" placeholder="" onkeydown="if(event.key==='Enter')checkQ()" oninput="expandBlank(this)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></span>`;
    }
    const isPunct=/^[、。「」！？…]$/.test(w);
    return isPunct?`<span style="margin-left:-.3em">${w}</span>`:`<span>${w}</span>`;
  }).join(' ');
}

// growInp不要（contenteditable spanは自動でサイズ調整）

function expandBlank(inp){
  // 隠しrulerで入力テキストの実幅を測り、答え幅より広ければ広げる
  let ruler=document.getElementById('__ruler');
  if(!ruler){
    ruler=document.createElement('span');
    ruler.id='__ruler';
    ruler.style.cssText='position:fixed;top:-999px;left:-999px;visibility:hidden;white-space:nowrap;pointer-events:none;';
    document.body.appendChild(ruler);
  }
  const cs=getComputedStyle(inp);
  ruler.style.fontFamily=cs.fontFamily;
  ruler.style.fontSize=cs.fontSize;
  ruler.style.letterSpacing=cs.letterSpacing;
  ruler.style.padding=cs.padding;
  ruler.textContent=inp.value||'x';
  const valPx=ruler.offsetWidth+10;
  const curPx=inp.offsetWidth;
  if(valPx > curPx){
    inp.style.width=valPx+'px';
  }
  // 空になったら元のem幅に戻す
  if(!inp.value){
    inp.style.width='';
  }
}

function renderQuizCard(){
  const verses=partVerses(qPart);
  const total=verses.length;
  if(qIdx<0)qIdx=0;
  if(qIdx>=total)qIdx=total-1;
  const v=verses[qIdx];
  if(!v){document.getElementById('quiz-content').innerHTML='';return;}

  // Init quiz state for this card if needed
  if(!QS[qIdx]){
    const text=lang==='jp'?v.jp_raw:v.kr;
    const words=tokenize(text,lang);
    const blanks=selectBlanks(words,diff,lang);
    QS[qIdx]={blanks,words,checked:false};
  }
  const state=QS[qIdx];
  const text=lang==='jp'?v.jp_raw:v.kr;
  const words=state.words||tokenize(text,lang);
  const rendered=mkBlanked(words,state.blanks,qIdx,lang);

  const saved=loadProg();
  const passed=saved[vkey(v)]&&saved[vkey(v)].passed;
  const ds=passed?new Date(saved[vkey(v)].date).toLocaleDateString('ja-JP'):'';
  const pi=PARTS.find(p=>p.id===v.part);

  document.getElementById('q-counter').innerHTML=
    `<strong>${qPart}パート</strong> &nbsp;${qIdx+1} / ${total}節`;

  document.getElementById('quiz-content').innerHTML=`
    <div class="quiz-card">
      <div class="qc-head">
        <span class="qc-ref">${v.ref}</span>
        <span class="qc-part">${v.cat_jp}<br><span style="font-family:'Noto Sans KR',sans-serif;">${v.cat_kr}</span></span>
        ${passed?`<span class="qc-pass">✓ 暗唱済 ${ds}</span>`:''}
      </div>
      <div class="quiz-body">
        <div class="quiz-text${lang==='kr'?' kr':''}" id="qt">${rendered}</div>
        <div class="qactions">
          <button class="btn-ok" onclick="checkQ()">✓ 確認</button>
          <button class="btn-sub" onclick="revealQ()">答えを見る</button>
          <button class="btn-sub" onclick="resetQ()">↺</button>
          <span id="sc"></span>
        </div>
      </div>
    </div>`;

  // Restore checked state visually if already done
  if(state.checked){
    state.blanks.forEach(wi=>{
      const inp=document.getElementById(`b-${qIdx}-${wi}`);
      if(inp){
        const wrap=document.getElementById(`bw-${qIdx}-${wi}`);
        const ok=norm(inp.value)===norm(inp.dataset.answer);
        inp.className='blank-inp';
        if(wrap) wrap.className=ok?'blank-wrap ok':'blank-wrap ng';
      }
    });
  }

  // Page nav
  document.getElementById('q-page-nav').innerHTML=`
    <button class="nav-btn" onclick="quizGo(-1)" ${qIdx===0?'disabled':''}>← 前</button>
    <button class="nav-btn primary" onclick="quizGo(1)" ${qIdx===total-1?'disabled':''}>次 →</button>`;

  updateQP(verses);
  window.scrollTo({top:0,behavior:'smooth'});
}

function quizGo(dir){
  qIdx+=dir;
  renderQuizCard();
}

function norm(s){return s.replace(/\s+/g,'').replace(/[ａ-ｚＡ-Ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).toLowerCase().replace(/[、。「」！？…・,.]/g,'');}

function checkQ(){
  const verses=partVerses(qPart);
  const v=verses[qIdx];
  const state=QS[qIdx];
  if(!state) return;
  let correct=0;
  state.blanks.forEach(wi=>{
    const inp=document.getElementById(`b-${qIdx}-${wi}`);if(!inp)return;
    const wrap=document.getElementById(`bw-${qIdx}-${wi}`);
    const isCorrect=norm(inp.value)===norm(inp.dataset.answer);
    inp.className='blank-inp';
    if(wrap) wrap.className=isCorrect?'blank-wrap ok':'blank-wrap ng';
    if(isCorrect){ inp.value=inp.dataset.answer; inp.readOnly=true; }
    if(isCorrect) correct++;
  });
  const tot=state.blanks.size;
  const passed=correct===tot;
  document.getElementById('sc').innerHTML=passed
    ?`<span class="score-badge ok">✓ 正解！</span>`
    :`<span class="score-badge ng">${correct}/${tot}</span>`;
  state.checked=true;
  if(v) saveProg(vkey(v), passed);
  updateQP(verses);
  updateGP();
  upPartNav('quiz');
  // Auto advance on correct after short delay
  if(passed && qIdx<verses.length-1){
    setTimeout(()=>{qIdx++;renderQuizCard();},900);
  }
}

function revealQ(){
  const state=QS[qIdx];if(!state)return;
  state.blanks.forEach(wi=>{
    const inp=document.getElementById(`b-${qIdx}-${wi}`);if(!inp)return;
    inp.value=inp.dataset.answer;inp.className='blank-inp';inp.readOnly=true;
    const wrap=document.getElementById(`bw-${qIdx}-${wi}`);
    if(wrap) wrap.className='blank-wrap show';
  });
}

function resetQ(){
  const verses=partVerses(qPart);
  const v=verses[qIdx];if(!v)return;
  const text=lang==='jp'?v.jp_raw:v.kr;
  const words=tokenize(text,lang);
  const blanks=selectBlanks(words,diff,lang);
  QS[qIdx]={blanks,words,checked:false};
  try{const d=loadProg();delete d[vkey(v)];localStorage.setItem(SK,JSON.stringify(d));}catch(e){}
  renderQuizCard();
  updateGP();
  upPartNav('quiz');
}

function updateQP(verses){
  const tot=verses.length;
  const saved=loadProg();
  const done=verses.filter(v=>saved[vkey(v)]).length;
  const pct=tot?Math.round(done/tot*100):0;
  document.getElementById('qp-fill').style.width=pct+'%';
  document.getElementById('qp-text').textContent=done+' / '+tot+' 完了 ('+pct+'%)';
}
function updateGP(){
  const data=loadProg();
  const passed=Object.values(data).filter(d=>d.passed).length;
  const pct=Math.round(passed/72*100);
  document.getElementById('gp-fill').style.width=pct+'%';
  document.getElementById('gp-text').textContent=passed+' / 72 節 ('+pct+'%)';
}
function confirmClearProgress(){
  if(confirm('全ての暗唱進捗をリセットしますか？')){
    clearProg();QS={};updateGP();
    buildPartNav('browse-parts','browse');
    buildPartNav('quiz-parts','quiz');
    renderQuizCard();
  }
}
function switchTab(t){
  tab=t;
  document.getElementById('browse-mode').classList.toggle('hidden',t!=='browse');
  document.getElementById('quiz-mode').classList.toggle('hidden',t!=='quiz');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='browse')||(i===1&&t==='quiz')));
}
function setLang(l){
  lang=l;QS={};
  ['jp','kr'].forEach(x=>document.getElementById('lang-'+x).className='tg-btn'+(x===l?' active':''));
  renderQuizCard();
}
function setDiff(d){
  diff=d;QS={};
  ['easy','medium','hard'].forEach(x=>document.getElementById('diff-'+x).className='tg-btn'+(x===d?' active':''));
  renderQuizCard();
}
init();
</script>
